# ── Feature Engineering Configuration ───────────────────────────────────────
# Controls which transformations are applied to each variable.
# All features are strictly backward-looking (no future leakage).

base_variables:
  - nino34_anom      # primary ENSO diagnostic
  - nino12_anom      # eastern Pacific SST anomaly
  - nino3_anom       # central/eastern Pacific
  - nino4_anom       # western Pacific
  - soi              # atmospheric counterpart
  - zwnd850_anom     # Walker circulation proxy

transformations:
  lags:
    enabled: true
    months: [1, 3, 6]          # e.g. nino34_anom_lag1, _lag3, _lag6

  rolling_mean:
    enabled: true
    windows: [3]               # 3-month running mean (ONI-style)

  rolling_std:
    enabled: true
    windows: [3]

  diff:
    enabled: true
    periods: [1]               # month-over-month tendency

mjo:
  enabled: false
  phase_encoding: sincos       # encodes phase 1–8 → sin(2πp/8), cos(2πp/8)
  amplitude_threshold: 1.0     # only encode when amplitude ≥ threshold

# Columns always kept regardless of above flags
always_include:
  - date
  - year
  - month
  - enso_phase          # label at t

# Columns to drop before export (intermediate/leaky)
drop_before_export: []
